# .github/workflows/retrain.yml
#
# CAMBIO vs versión anterior:
# - runs-on: self-hosted
# - Acceso directo al stack local (sin SSH)
# - Tras reentrenar, recarga el modelo en la API con POST /reload

name: Scheduled Retrain

on:
  schedule:
    - cron: "0 3 * * 1"   # lunes 03:00 UTC
  workflow_dispatch:
    inputs:
      min_accuracy:
        description: "Accuracy mínima del quality gate"
        required: false
        default: "0.90"
      min_f1:
        description: "F1-score mínimo"
        required: false
        default: "0.90"

env:
  DEPLOY_DIR: /opt/mlops-stack
  COMPOSE_PROJECT: mlops

jobs:

  retrain:
    name: Retrain Model
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Verify stack is running
        run: |
          docker compose -p ${{ env.COMPOSE_PROJECT }} \
            -f ${{ env.DEPLOY_DIR }}/docker-compose.yml \
            ps mlflow | grep -q "(healthy)" \
            || (echo "MLFlow not running — start the stack first" && exit 1)
          echo "Stack is running ✓"

      - name: Retrain model
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose -p ${{ env.COMPOSE_PROJECT }} run --rm \
            -e MLFLOW_TRACKING_URI=http://mlflow:5001 \
            model-trainer

      - name: Run QA on new model
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose -p ${{ env.COMPOSE_PROJECT }} run --rm \
            -e MLFLOW_TRACKING_URI=http://mlflow:5001 \
            -e INFERENCE_API_URL=http://inference-api:8000 \
            -e GATE_MIN_ACCURACY=${{ github.event.inputs.min_accuracy || '0.90' }} \
            -e GATE_MIN_F1=${{ github.event.inputs.min_f1 || '0.90' }} \
            test-runner

      # Recargar el modelo en la API sin reiniciar el contenedor
      - name: Hot-reload model in inference-api
        if: success()
        run: |
          curl -sf -X POST http://localhost:8000/reload \
            && echo "Model reloaded in inference-api ✓" \
            || echo "Reload failed — inference-api may need restart"

      - name: Summary
        if: always()
        run: |
          echo "## Retrain Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Min accuracy:** ${{ github.event.inputs.min_accuracy || '0.90' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
