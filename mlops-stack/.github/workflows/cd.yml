# .github/workflows/cd.yml
#
# NUEVO ARCHIVO — no existía en la versión anterior.
#
# Workflow de Entrega Continua (CD).
# Se dispara SOLO en push a main (merge de PR aprobado).
# Construye, publica imágenes en GHCR y despliega en el servidor de producción.
#
# Requiere los siguientes Secrets en el repositorio:
#   PROD_HOST        → IP o hostname del servidor (ej: 203.0.113.10)
#   PROD_USER        → Usuario SSH (ej: ubuntu)
#   PROD_SSH_KEY     → Clave privada SSH (contenido del archivo .pem o id_rsa)
#   PROD_DEPLOY_PATH → Ruta en el servidor (ej: /opt/mlops-stack)

name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  # ── JOB 1: Build y push de imágenes a GHCR ───────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          TAG="sha-${GITHUB_SHA::8}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Construir y publicar cada imagen con dos tags:
      #   - sha-<commit>  → inmutable, para trazar qué commit está en producción
      #   - latest        → conveniente para el servidor de producción

      - name: Build & push mlflow
        uses: docker/build-push-action@v5
        with:
          context: ./mlflow
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/mlflow:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/mlflow:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/mlflow:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/mlflow:cache,mode=max

      - name: Build & push model-trainer
        uses: docker/build-push-action@v5
        with:
          context: ./model-trainer
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/model-trainer:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/model-trainer:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/model-trainer:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/model-trainer:cache,mode=max

      - name: Build & push inference-api
        uses: docker/build-push-action@v5
        with:
          context: ./inference-api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/inference-api:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/inference-api:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/inference-api:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/inference-api:cache,mode=max

      - name: Build & push drift-detector
        uses: docker/build-push-action@v5
        with:
          context: ./drift-detector
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/drift-detector:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/drift-detector:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/drift-detector:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/drift-detector:cache,mode=max

      - name: Build & push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nginx:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/nginx:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/nginx:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/nginx:cache,mode=max

      - name: Build & push test-runner
        uses: docker/build-push-action@v5
        with:
          context: ./tests
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/test-runner:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/test-runner:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/test-runner:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/test-runner:cache,mode=max

  # ── JOB 2: Deploy al servidor de producción ──────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production    # requiere aprobación manual si se configura en GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose.yml to server
        run: |
          scp docker-compose.yml \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/docker-compose.yml

      - name: Deploy stack on server
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          REGISTRY_IMAGE: ${{ env.IMAGE_PREFIX }}
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << ENDSSH
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            echo "=== Logging into GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== Pulling updated images ==="
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}
            export REGISTRY_IMAGE=${{ env.IMAGE_PREFIX }}
            docker compose pull mlflow inference-api drift-detector nginx

            echo "=== Rolling update ==="
            # Actualizar inference-api sin downtime (zero-downtime swap)
            docker compose up -d --no-deps inference-api
            sleep 10
            curl -sf http://localhost:8000/health || \
              (echo "inference-api unhealthy after update" && exit 1)

            # Actualizar resto de servicios
            docker compose up -d --no-deps mlflow drift-detector nginx

            echo "=== Running post-deploy QA ==="
            docker compose run --rm test-runner
            echo "Deploy completed successfully ✓"
          ENDSSH

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deploy to production completed"
          echo "   Image tag: ${{ needs.build-and-push.outputs.image-tag }}"
          echo "   Commit: ${{ github.sha }}"
          echo "   Triggered by: ${{ github.actor }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deploy FAILED"
          echo "   Manual rollback required on ${{ secrets.PROD_HOST }}"
