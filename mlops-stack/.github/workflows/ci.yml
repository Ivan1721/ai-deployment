# .github/workflows/ci.yml
#
# NUEVO ARCHIVO — no existía en la versión anterior.
#
# Workflow de Integración Continua (CI).
# Se dispara en cada Pull Request hacia main o develop.
# NO hace deploy — solo valida que el código es correcto.
#
# Pasos:
#   1. Checkout del código
#   2. Build de las imágenes Docker
#   3. Levantar MLFlow + entrenar modelo
#   4. Correr test-runner (Nivel 1 Data + Nivel 2 Model)
#   5. Publicar reporte de tests como artefacto del workflow
#   6. Si los tests fallan → el PR queda bloqueado

name: CI — Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  # ── JOB 1: Lint y validación rápida ──────────────────────────────────────
  lint:
    name: Lint & Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 yamllint

      - name: Lint Python (flake8)
        run: |
          flake8 model-trainer/train.py \
                 inference-api/app.py \
                 drift-detector/detector.py \
                 drift-detector/retrain_trigger.py \
                 tests/run_tests.py \
                 tests/test_data.py \
                 tests/test_model.py \
                 tests/test_api.py \
            --max-line-length=110 \
            --extend-ignore=E501,W503 \
            --statistics
        continue-on-error: true   # no bloquear PR por estilo, solo reportar

      - name: Lint docker-compose.yml
        run: yamllint docker-compose.yml -d relaxed

  # ── JOB 2: Build de imágenes ──────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag from commit SHA
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login al GitHub Container Registry para cachear capas entre runs
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build de cada imagen con cache de capas en GHCR
      - name: Build mlflow
        uses: docker/build-push-action@v5
        with:
          context: ./mlflow
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/mlflow:${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/mlflow:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/mlflow:cache,mode=max

      - name: Build model-trainer
        uses: docker/build-push-action@v5
        with:
          context: ./model-trainer
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/model-trainer:${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/model-trainer:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/model-trainer:cache,mode=max

      - name: Build inference-api
        uses: docker/build-push-action@v5
        with:
          context: ./inference-api
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/inference-api:${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/inference-api:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/inference-api:cache,mode=max

      - name: Build test-runner
        uses: docker/build-push-action@v5
        with:
          context: ./tests
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/test-runner:${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/test-runner:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/test-runner:cache,mode=max

  # ── JOB 3: Tests (Nivel 1 + Nivel 2) ────────────────────────────────────
  test:
    name: Run QA Suite (Data + Model)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Start MLFlow
        run: |
          docker compose up -d mlflow
          echo "Waiting for MLFlow health check..."
          timeout 120 bash -c \
            'until docker compose ps mlflow | grep -q "healthy"; do sleep 3; done'
          echo "MLFlow is healthy ✓"

      - name: Train model
        run: docker compose run --rm model-trainer

      - name: Start inference-api
        run: |
          docker compose up -d inference-api
          echo "Waiting for inference-api..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8000/health > /dev/null 2>&1; do sleep 4; done'
          echo "inference-api is ready ✓"

      - name: Run QA suite
        run: |
          docker compose run --rm \
            -e MLFLOW_TRACKING_URI=http://mlflow:5001 \
            -e INFERENCE_API_URL=http://inference-api:8000 \
            test-runner
        # Exit code 1 = quality gate falló = CI falla = PR bloqueado

      - name: Collect test reports
        if: always()
        run: |
          docker compose run --rm test-runner \
            python -m pytest test_data.py test_model.py \
            --json-report --json-report-file=/tmp/ci-report.json \
            -v 2>/dev/null || true
          docker cp \
            $(docker compose ps -q test-runner 2>/dev/null || echo "test-runner"):/tmp/ci-report.json \
            ./ci-report.json 2>/dev/null || echo "{}" > ./ci-report.json

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.sha }}
          path: ci-report.json
          retention-days: 30

      - name: Cleanup
        if: always()
        run: docker compose down -v
