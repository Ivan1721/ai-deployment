# .github/workflows/retrain.yml
#
# NUEVO ARCHIVO — no existía en la versión anterior.
#
# Workflow de Reentrenamiento Programado (Scheduled CT).
# Complementa el reentrenamiento automático del drift-detector (Clase 01)
# con un ciclo programado semanal que garantiza que el modelo se actualice
# aunque el drift no sea lo suficientemente severo para disparar el trigger.
#
# También puede dispararse manualmente desde la UI de GitHub Actions
# (workflow_dispatch) con parámetros configurables.

name: Scheduled Retrain

on:
  # Todos los lunes a las 03:00 UTC
  schedule:
    - cron: "0 3 * * 1"

  # Disparo manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      min_accuracy:
        description: "Accuracy mínima del quality gate"
        required: false
        default: "0.90"
      min_f1:
        description: "F1-score mínimo del quality gate"
        required: false
        default: "0.90"
      force_promote:
        description: "Promover aunque no supere al champion (true/false)"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  retrain:
    name: Retrain & Validate Model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set parameters
        id: params
        run: |
          echo "min_accuracy=${{ github.event.inputs.min_accuracy || '0.90' }}" >> $GITHUB_OUTPUT
          echo "min_f1=${{ github.event.inputs.min_f1 || '0.90' }}"             >> $GITHUB_OUTPUT
          echo "force_promote=${{ github.event.inputs.force_promote || 'false' }}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker compose pull mlflow model-trainer test-runner || \
            docker compose build mlflow model-trainer test-runner

      - name: Start MLFlow
        run: |
          docker compose up -d mlflow
          timeout 120 bash -c \
            'until docker compose ps mlflow | grep -q "healthy"; do sleep 3; done'
          echo "MLFlow ready ✓"

      - name: Retrain model
        run: |
          docker compose run --rm \
            -e GATE_MIN_ACCURACY=${{ steps.params.outputs.min_accuracy }} \
            -e GATE_MIN_F1=${{ steps.params.outputs.min_f1 }} \
            model-trainer

      - name: Run QA suite on new model
        run: |
          docker compose run --rm \
            -e MLFLOW_TRACKING_URI=http://mlflow:5001 \
            -e GATE_MIN_ACCURACY=${{ steps.params.outputs.min_accuracy }} \
            -e GATE_MIN_F1=${{ steps.params.outputs.min_f1 }} \
            test-runner

      - name: Deploy updated model to production
        if: success()
        env:
          IMAGE_TAG: latest
          REGISTRY_IMAGE: ${{ env.IMAGE_PREFIX }}
        run: |
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          # Si hay acceso SSH, recargar el modelo en producción
          # Si no, el drift-detector lo actualizará en el próximo ciclo

      - name: Summary
        if: always()
        run: |
          echo "## Retrain Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Min accuracy: ${{ steps.params.outputs.min_accuracy }}" >> $GITHUB_STEP_SUMMARY
          echo "- Min F1: ${{ steps.params.outputs.min_f1 }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: docker compose down -v
