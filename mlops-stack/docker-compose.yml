# CAMBIO vs versión anterior con CI/CD remoto:
# - Se elimina REGISTRY_IMAGE e IMAGE_TAG (no hay registry externo)
# - Las imágenes siempre se construyen localmente con build:
# - Se agrega restart: unless-stopped para que los servicios
#   persistan entre reboots sin necesidad de docker compose up manual
# - Se mantiene el proyecto (-p mlops) para coexistir con los
#   contenedores temporales que crea el runner durante CI

networks:
  mlops-net:
    driver: bridge

volumes:
  mlflow-data:   # persiste entre deploys y reboots

services:

  mlflow:
    build: ./mlflow
    container_name: mlflow-server
    restart: unless-stopped          # NUEVO: persiste entre reboots
    ports:
      - "5001:5001"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
    networks:
      - mlops-net

  model-trainer:
    build: ./model-trainer
    container_name: model-trainer
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops-net

  inference-api:
    build: ./inference-api
    container_name: inference-api
    restart: unless-stopped          # NUEVO
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MODEL_NAME: iris-classifier
      MODEL_STAGE: Production
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - mlops-net

  drift-detector:
    build: ./drift-detector
    container_name: drift-detector
    restart: unless-stopped          # NUEVO
    environment:
      MLFLOW_TRACKING_URI:       http://mlflow:5001
      INFERENCE_API_URL:         http://inference-api:8000
      MODEL_NAME:                iris-classifier
      KS_P_VALUE_THRESHOLD:      "0.05"
      CHI2_P_VALUE_THRESHOLD:    "0.05"
      CONSECUTIVE_DRIFT_WINDOWS: "2"
      WINDOW_SIZE:               "30"
      CHECK_INTERVAL_S:          "30"
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops-net

  # test-runner: sin restart — se ejecuta manualmente o desde CI
  test-runner:
    build: ./tests
    container_name: test-runner
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
      INFERENCE_API_URL:   http://inference-api:8000
      MODEL_NAME:          iris-classifier
      MODEL_STAGE:         Production
      GATE_MIN_ACCURACY:   "0.90"
      GATE_MIN_F1:         "0.90"
      GATE_MAX_LATENCY_MS: "500"
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops-net

  nginx:
    build: ./nginx
    container_name: nginx-proxy
    restart: unless-stopped          # NUEVO
    ports:
      - "80:80"
    depends_on:
      - mlflow
      - inference-api
    networks:
      - mlops-net
