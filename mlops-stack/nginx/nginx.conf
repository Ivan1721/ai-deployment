events { worker_connections 1024; }

http {
    upstream mlflow   { server mlflow:5001; }
    upstream inference { server inference-api:8000; }
    upstream oauth2_proxy { server oauth2-proxy:4180; }  # SECURITY FIX P0-1

    # SECURITY FIX P0-3: Redirigir HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # SECURITY FIX P0-3 & P0-1: Servidor HTTPS con autenticación
    server {
        listen 443 ssl;

        # Certificados (volumen montado desde docker-compose.yml)
        ssl_certificate /etc/nginx/certs/mlops-cert.pem;
        ssl_certificate_key /etc/nginx/certs/mlops-key.pem;

        # Configuración de TLS segura
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # SECURITY FIX P0-1: Endpoints de OAuth2
        location /oauth2/ {
            proxy_pass       http://oauth2_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Auth-Request-Redirect $scheme://$host$request_uri;
        }

        # SECURITY FIX P0-1: Verificación de autenticación
        location = /oauth2/auth {
            proxy_pass       http://oauth2_proxy;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        location /mlflow/ {
            # SECURITY FIX P0-1: Requerir autenticación
            auth_request /oauth2/auth;
            auth_request_set $user $upstream_http_x_auth_request_user;
            auth_request_set $email $upstream_http_x_auth_request_email;

            proxy_pass       http://mlflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User $user;
            proxy_set_header X-Email $email;
            proxy_read_timeout 300s;
        }

        location /api/ {
            # SECURITY FIX P0-1: Requerir autenticación
            auth_request /oauth2/auth;
            auth_request_set $user $upstream_http_x_auth_request_user;

            proxy_pass       http://inference/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User $user;
        }

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
